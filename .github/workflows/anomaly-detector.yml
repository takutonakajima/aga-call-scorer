name: anomaly_detector.py

on:
  schedule:
    # Optimized 2026-05-03 from '15 * * * *' (24 runs/day) to ~15 runs/day.
    # Detects coaching anomalies (voicemail walls, low connect rate, etc.).
    # No reps work outside 8am-9pm ET, so off-hours runs would always be empty.
    # To revert: replace both lines with '15 * * * *'
    - cron: '15 12-23 * * *'  # business hours, every hour at :15 (UTC 12:00-23:59)
    - cron: '15 0-2 * * *'    # business hours, every hour at :15 (UTC 00:00-02:59)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run
        env:
          TWILIO_ACCOUNT: ${{ secrets.TWILIO_ACCOUNT }}
          TWILIO_AUTH: ${{ secrets.TWILIO_AUTH }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          SCORE_INGEST_URL: ${{ secrets.SCORE_INGEST_URL }}
          SCORE_API_URL: ${{ secrets.SCORE_API_URL }}
          DIALS_INGEST_URL: ${{ secrets.DIALS_INGEST_URL }}
          TIPS_INGEST_URL: ${{ secrets.TIPS_INGEST_URL }}
          TOPCALL_INGEST_URL: ${{ secrets.TOPCALL_INGEST_URL }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          SHIFT_OVERRIDE_API_URL: ${{ secrets.SHIFT_OVERRIDE_API_URL }}
          ANOMALY_STATE_API_URL: ${{ secrets.ANOMALY_STATE_API_URL }}
          ANOMALY_STATE_INGEST_URL: ${{ secrets.ANOMALY_STATE_INGEST_URL }}
        run: python scripts/anomaly_detector.py
