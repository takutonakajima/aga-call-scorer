name: script_updates_sync.py

on:
  schedule:
    # Every 15 minutes, 24/7. Optimized 2026-05-03 from every 5 min (-67% runs).
    # Sophia/Mai post ACTION updates a few times/week — 5 min granularity was
    # overkill. 15 min is still well below the call center site's own 5-min
    # auto-refresh cadence, so user-perceived latency is unchanged.
    # To revert: change to '*/5 * * * *'
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install --quiet cryptography
      - name: Run
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          GOOGLE_SHEETS_KEY: ${{ secrets.GOOGLE_SHEETS_KEY }}
          SCRIPT_SYNC_STATE_GET: ${{ secrets.SCRIPT_SYNC_STATE_GET }}
          SCRIPT_SYNC_STATE_SET: ${{ secrets.SCRIPT_SYNC_STATE_SET }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
        run: python scripts/script_updates_sync.py
