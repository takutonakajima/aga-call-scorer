name: dial_tracker.py

on:
  schedule:
    # Optimized 2026-05-03 from '*/30 * * * *' (48 runs/day) to ~30 runs/day.
    # Dial counts feed the dashboard; no one views the dashboard outside
    # 8am-9pm ET (= 12:00-02:00 UTC). Off-hours runs are pointless.
    # To revert: replace both lines with '*/30 * * * *'
    - cron: '*/30 12-23 * * *'  # business hours, every 30 min (UTC 12:00-23:59)
    - cron: '*/30 0-2 * * *'    # business hours, every 30 min (UTC 00:00-02:59)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run
        env:
          TWILIO_ACCOUNT: ${{ secrets.TWILIO_ACCOUNT }}
          TWILIO_AUTH: ${{ secrets.TWILIO_AUTH }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          SCORE_INGEST_URL: ${{ secrets.SCORE_INGEST_URL }}
          SCORE_API_URL: ${{ secrets.SCORE_API_URL }}
          DIALS_INGEST_URL: ${{ secrets.DIALS_INGEST_URL }}
          TIPS_INGEST_URL: ${{ secrets.TIPS_INGEST_URL }}
          TOPCALL_INGEST_URL: ${{ secrets.TOPCALL_INGEST_URL }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          SHIFT_OVERRIDE_API_URL: ${{ secrets.SHIFT_OVERRIDE_API_URL }}
          ANOMALY_STATE_API_URL: ${{ secrets.ANOMALY_STATE_API_URL }}
          ANOMALY_STATE_INGEST_URL: ${{ secrets.ANOMALY_STATE_INGEST_URL }}
        run: python scripts/dial_tracker.py
