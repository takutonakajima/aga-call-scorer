name: Score Calls (business hours every 15 min, off-hours hourly)

on:
  schedule:
    # Optimized 2026-05-03 from '*/15 * * * *' (96 runs/day) to ~69 runs/day.
    # VAs work 8am-9pm ET (= 12:00-02:00 UTC EDT, 13:00-02:00 UTC EST).
    # Window 12:00-02:00 UTC covers EDT perfectly + buffers for EST.
    # Off-hours hourly sweep catches any straggler recordings.
    # To revert: replace all 3 lines with '*/15 * * * *'
    - cron: '*/15 12-23 * * *'  # business hours, every 15 min (UTC 12:00-23:59)
    - cron: '*/15 0-2 * * *'    # business hours, every 15 min (UTC 00:00-02:59)
    - cron: '0 3-11 * * *'      # off-hours sweep, hourly (UTC 03:00-11:59)
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run scorer
        env:
          TWILIO_ACCOUNT: ${{ secrets.TWILIO_ACCOUNT }}
          TWILIO_AUTH: ${{ secrets.TWILIO_AUTH }}
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
          SCORE_INGEST_URL: ${{ secrets.SCORE_INGEST_URL }}
          SCORE_API_URL: ${{ secrets.SCORE_API_URL }}
          DIALS_INGEST_URL: ${{ secrets.DIALS_INGEST_URL }}
          TIPS_INGEST_URL: ${{ secrets.TIPS_INGEST_URL }}
          TOPCALL_INGEST_URL: ${{ secrets.TOPCALL_INGEST_URL }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          SHIFT_OVERRIDE_API_URL: ${{ secrets.SHIFT_OVERRIDE_API_URL }}
          ANOMALY_STATE_API_URL: ${{ secrets.ANOMALY_STATE_API_URL }}
          ANOMALY_STATE_INGEST_URL: ${{ secrets.ANOMALY_STATE_INGEST_URL }}
        run: python scripts/score_calls.py
